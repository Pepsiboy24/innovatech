<!-- html/shared/details_modal.html -->
<style>
/* Modern Modal Styles for Universal Router */
.universal-modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    z-index: 99999;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s ease;
}

.universal-modal-overlay.active {
    display: flex;
    opacity: 1;
}

.universal-modal-container {
    background: #ffffff;
    width: 90%;
    max-width: 800px;
    height: 85vh;
    max-height: 800px;
    border-radius: 20px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform: translateY(20px) scale(0.98);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.universal-modal-overlay.active .universal-modal-container {
    transform: translateY(0) scale(1);
}

.universal-modal-header {
    background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
    padding: 30px;
    color: white;
    position: relative;
    flex-shrink: 0;
}

.universal-modal-close {
    position: absolute;
    top: 20px;
    right: 20px;
    background: rgba(255,255,255,0.2);
    border: none;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
}

.universal-modal-close:hover {
    background: rgba(255,255,255,0.3);
}

.universal-modal-profile {
    display: flex;
    align-items: center;
    gap: 20px;
}

.universal-modal-avatar {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #e2e8f0;
    border: 3px solid rgba(255,255,255,0.8);
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    color: #64748b;
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
}

.universal-modal-info h2 {
    margin: 0 0 5px 0;
    font-size: 1.5rem;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
}

.universal-modal-role {
    display: inline-block;
    background: rgba(255,255,255,0.2);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.875rem;
    font-weight: 500;
}

.universal-modal-nav {
    display: flex;
    background: #f8fafc;
    border-bottom: 1px solid #e2e8f0;
    padding: 0 10px;
    flex-shrink: 0;
    overflow-x: auto;
}

.universal-modal-tab {
    padding: 16px 24px;
    background: none;
    border: none;
    font-size: 0.95rem;
    font-weight: 500;
    color: #64748b;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    font-family: inherit;
    white-space: nowrap;
}

.universal-modal-tab:hover {
    color: #4f46e5;
}

.universal-modal-tab.active {
    color: #4f46e5;
    border-bottom-color: #4f46e5;
}

.universal-modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 30px;
    background: #ffffff;
    position: relative;
}

.universal-modal-content-area {
    display: none;
    animation: fadeIn 0.3s ease;
}

.universal-modal-content-area.active {
    display: block;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(5px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Loading State */
.universal-modal-loader {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.9);
    z-index: 10;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 15px;
}

.universal-modal-loader.active {
    display: flex;
}

.um-spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #e0e7ff;
    border-top: 4px solid #4f46e5;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* Data Grid Styles */
.um-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
}

.um-data-card {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 12px;
    padding: 16px;
    transition: transform 0.2s, box-shadow 0.2s;
}

.um-data-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
}

.um-label {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #94a3b8;
    margin-bottom: 4px;
}

.um-value {
    font-size: 1rem;
    color: #1e293b;
    font-weight: 500;
}
.um-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}
.um-table th, .um-table td {
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid #e2e8f0;
}
.um-table th {
    background: #f8fafc;
    font-weight: 600;
    color: #475569;
}
</style>

<div class="universal-modal-overlay" id="universalModalOverlay">
    <div class="universal-modal-container">
        <!-- Header -->
        <div class="universal-modal-header">
            <button class="universal-modal-close" id="universalModalClose">
                <i class="fa fa-times"></i>
            </button>
            <div class="universal-modal-profile">
                <div class="universal-modal-avatar" id="umAvatar">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="universal-modal-info">
                    <h2 id="umName">Loading...</h2>
                    <span class="universal-modal-role" id="umRole">Loading Context...</span>
                </div>
            </div>
        </div>

        <!-- Navigation -->
        <div class="universal-modal-nav" id="umTabsContainer">
            <button class="universal-modal-tab active" data-target="um-overview">Overview</button>
            <button class="universal-modal-tab" data-target="um-academic">Academic/Records</button>
            <button class="universal-modal-tab" data-target="um-contacts">Contacts</button>
            <button class="universal-modal-tab" data-target="um-administrative">Administrative</button>
        </div>

        <!-- Body area with loader -->
        <div class="universal-modal-body">
            <div class="universal-modal-loader" id="umLoader">
                <div class="um-spinner"></div>
                <p style="color: #64748b; font-weight: 500;">Fetching Details...</p>
            </div>

            <!-- Tab Contents -->
            <div class="universal-modal-content-area active" id="um-overview"></div>
            <div class="universal-modal-content-area" id="um-academic"></div>
            <div class="universal-modal-content-area" id="um-contacts"></div>
            <div class="universal-modal-content-area" id="um-administrative"></div>
        </div>
    </div>
</div>
