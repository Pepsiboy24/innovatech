<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Skeleton Test</title>
    <!-- Only load student portal CSS -->
    <link rel="stylesheet" href="/portals/student/studentsPortalStyles/studentPortal.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f8fafc;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .section {
            margin-bottom: 32px;
        }
        .section-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: #374151;
            margin: 0 0 16px 0;
        }
        .upcoming-classes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        .debug-info {
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            padding: 12px;
            margin: 12px 0;
            font-family: monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🎬 Minimal Skeleton Test</h1>
        <p>Testing skeleton animation with ONLY studentPortal.css loaded.</p>
        
        <div class="debug-info">
            <strong>CSS Loaded:</strong><br>
            ✅ /portals/student/studentsPortalStyles/studentPortal.css<br>
            ❌ No other CSS files
        </div>
        
        <!-- Test skeleton-card -->
        <section class="section">
            <div class="section-header">
                <h2>skeleton-card Test</h2>
            </div>
            <div class="upcoming-classes-grid">
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
            </div>
        </section>
        
        <!-- Test skeleton-subject -->
        <section class="section">
            <div class="section-header">
                <h2>skeleton-subject Test</h2>
            </div>
            <div class="subjects-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px;">
                <div class="skeleton skeleton-subject"></div>
                <div class="skeleton skeleton-subject"></div>
                <div class="skeleton skeleton-subject"></div>
                <div class="skeleton skeleton-subject"></div>
            </div>
        </section>
        
        <!-- Test skeleton-activity -->
        <section class="section">
            <div class="section-header">
                <h2>skeleton-activity Test</h2>
            </div>
            <div id="activitySkeleton">
                <div class="skeleton skeleton-activity"></div>
                <div class="skeleton skeleton-activity"></div>
                <div class="skeleton skeleton-activity"></div>
                <div class="skeleton skeleton-activity"></div>
                <div class="skeleton skeleton-activity"></div>
            </div>
        </section>
        
        <div class="debug-info" id="debug-results">
            <strong>Animation Check:</strong><br>
            <div id="animation-status">Checking...</div>
        </div>
        
        <button onclick="checkAnimation()" style="background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; margin: 10px 5px;">
            🔍 Check Animation
        </button>
        
        <a href="../student/studentPortal.html" style="background: #10b981; color: white; text-decoration: none; padding: 10px 20px; border-radius: 6px; display: inline-block; margin: 10px 5px;">
            🏠 Student Portal
        </a>
    </div>

    <script>
        function checkAnimation() {
            const results = document.getElementById('animation-status');
            
            // Test skeleton-card
            const testCard = document.createElement('div');
            testCard.className = 'skeleton skeleton-card';
            document.body.appendChild(testCard);
            
            const cardStyles = window.getComputedStyle(testCard);
            const cardAnimation = cardStyles.animation;
            const cardBackground = cardStyles.background;
            
            document.body.removeChild(testCard);
            
            results.innerHTML = `
                <strong>skeleton-card:</strong><br>
                Animation: ${cardAnimation}<br>
                Background: ${cardBackground.substring(0, 60)}...<br>
                Height: ${cardStyles.height}<br><br>
                
                <strong>Expected:</strong><br>
                Animation: shimmer 1.4s infinite linear<br>
                Background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%)<br>
                Height: 100px<br><br>
                
                <strong>Animation Working:</strong> ${cardAnimation.includes('shimmer') ? '✅ YES' : '❌ NO'}
            `;
        }
        
        // Auto-check on load
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                checkAnimation();
            }, 1000);
        });
    </script>
</body>
</html>
