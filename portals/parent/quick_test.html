<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Skeleton Test</title>
    <style>
        /* CSS Variables */
        :root {
            --radius-sm: 6px;
            --radius: 8px;
        }
        
        /* Inline skeleton animation */
        @keyframes shimmer {
            0% {
                background-position: -600px 0;
            }
            100% {
                background-position: 600px 0;
            }
        }

        .skeleton {
            border-radius: var(--radius-sm);
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 600px 100%;
            animation: shimmer 1.4s infinite linear;
        }

        .skeleton-card {
            height: 100px;
            border-radius: var(--radius-sm);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f8fafc;
        }
        .test-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🎬 Quick Skeleton Test</h1>
        <p>If you see animated gray shimmer effects below, it's working!</p>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin: 20px 0;">
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
            <div class="skeleton skeleton-card"></div>
        </div>
        
        <p style="color: #10b981; font-weight: 600;">✅ If these have animated shimmer effects, the animation is working!</p>
        
        <a href="./parentsPortal.html" style="background: #007bff; color: white; text-decoration: none; padding: 10px 20px; border-radius: 6px; display: inline-block; margin-top: 20px;">
            👨‍👩‍👧‍👦 Go to Parent Portal
        </a>
    </div>
</body>
</html>
