<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <script type="module" src="../../core/authGuard.js"></script>
    <meta charset="UTF-8">

    <title>Parent Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css?v=1.1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    
    <link rel="stylesheet" href="/portals/student/studentsPortalStyles/studentPortal.css?v=1.1">
    <link rel="stylesheet" href="/assets/css/main.css?v=1.1">
    <link rel="stylesheet" href="./parentsPortalStyles/parentsPortal.css?v=1.1">
    
    <style>
        /* CSS Variables */
        :root {
            --radius-sm: 6px;
            --radius: 8px;
        }
        
        /* Inline skeleton animation to ensure it works */
        @keyframes shimmer {
            0% {
                background-position: -600px 0;
            }
            100% {
                background-position: 600px 0;
            }
        }

        .skeleton {
            border-radius: var(--radius-sm);
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 600px 100%;
            animation: shimmer 1.4s infinite linear;
        }

        .skeleton-card {
            height: 100px;
            border-radius: var(--radius-sm);
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Sidebar -->
        <nav class="sidebar" id="sidebar" data-sideBar>
            <div class="sidebar-header">
                <div class="logo" data-school-name="EduHub">
                    EH
                </div>
                <div class="user-info">
                    <div class="user-avatar">P</div>
                    <div class="user-details">
                        <h4>Parent</h4>
                        <p>Guardian</p>
                    </div>
                </div>
            </div>

            <div id="globalChildSwitcherContainer" style="padding: 0 2rem 1rem;"></div>

            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="./parentsPortal.html" class="nav-link active">
                        <i class="fas fa-chart-line"></i>
                        <span>Home</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="./childsResult.html" class="nav-link">
                        <i class="fas fa-file-alt"></i>
                        <span>Report Cards</span>
                    </a>
                </li>
                <li class="nav-item">
                    <a href="./payments.html" class="nav-link">
                        <i class="fas fa-credit-card"></i>
                        <span>Payments</span>
                    </a>
                </li>
            </ul>

            <div style="margin-top: auto; padding: 20px; border-top: 1px solid #e2e8f0;">
                <a href="#" id="parentLogoutBtn" class="nav-link" style="color: #ef4444; margin: 0; display: flex; align-items: center; gap: 0.75rem;">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Logout</span>
                </a>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <div class="header">
                <div class="welcome-section">
                    <h1>Parent Portal</h1>
                    <p>Monitor your child's academic journey</p>
                </div>
                <div class="header-actions">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()">
                        <i class="fas fa-bars"></i>
                    </button>
                    <button class="notification-btn">
                        <i class="fas fa-bell"></i>
                    </button>
                </div>
            </div>

            <!-- Academic Performance Section -->
            <section class="section">
                <div class="section-header">
                    <h2>Academic Performance</h2>
                </div>
                <div class="section-content">
                    <div class="performance-grid">
                        <div class="recent-grades">
                            <h4>Recent Grades</h4>
                            <!-- Skeleton -->
                            <div id="recentGradesSkeleton">
                                <div class="skeleton skeleton-card"></div>
                                <div class="skeleton skeleton-card"></div>
                                <div class="skeleton skeleton-card"></div>
                            </div>
                            <div id="recentGradesContainer" style="display:none;">
                                <!-- Real content will be injected here -->
                            </div>
                        </div>
                        <div class="overall-progress">
                            <h4>Overall Progress</h4>
                            <!-- Skeleton -->
                            <div id="progressSkeleton">
                                <div class="skeleton skeleton-card"></div>
                            </div>
                            <div id="progressChartContainer" style="display:none;">
                                <canvas id="progressChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Report Cards Section -->
            <section class="section">
                <div class="section-header">
                    <h2>Report Cards</h2>
                </div>
                <!-- Skeleton -->
                <div id="reportCardsSkeleton">
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                </div>
                <div id="reportCardsContainer" style="display:none;">
                    <!-- Real content will be injected here -->
                </div>
            </section>

            <!-- Messages Section -->
            <section class="section">
                <div class="section-header">
                    <h2>Messages</h2>
                </div>
                <!-- Skeleton -->
                <div id="messagesSkeleton">
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                    <div class="skeleton skeleton-card"></div>
                </div>
                <div id="messagesContainer" style="display:none;">
                    <!-- Real content will be injected here -->
                </div>
            </section>

        </main>
    </div>

    
    <script type="module" src="./parents_portal_sidebar.js"></script>
    <script type="module" src="./parentsDashboard.js"></script>
</body>

</html>
