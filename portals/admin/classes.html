<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0"/>
    <script type="module" src="../../core/authGuard.js"></script>
    <meta charset="UTF-8">
    
    <title>Classes Management - EduHubAdmin</title>
    <link rel="stylesheet" href="../../assets/css/schoolAdminStyles/classes.css?v=1.1">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css?v=1.1">
    <script src="../../assets/js-shared/ui_feedback.js"></script>
    <script type="module" src="./school_admin_sidebar.js" defer></script>
</head>

<body>
    <!-- Sidebar -->
    <div class="sidebar" data-sideBar></div>

    <!-- Main Content -->
    <div class="main">
        <div class="header">
            <div class="header-left">
                <div class="icon mobile-menu-btn" data-sideBarOpen><i class="fa fa-bars"></i></div>
                <div>
                    <h1 class="page-title">My Classes</h1>
                    <p class="page-subtitle">Manage your classes and sections</p>
                </div>
            </div>
            <div class="header-right">
    <button id="bulkUploadBtn" class="btn-secondary">
        <i class="fas fa-file-excel" style="color: #1d6f42; margin-right: 8px;"></i> Bulk Upload
    </button>
    <button id="createClassBtn" class="btn-primary">
        <i class="fas fa-plus"></i> Create New Class
    </button>
</div>
        </div>


            <div class="classes-grid" id="classesGrid" data-container>
                <!-- Classes will be dynamically loaded here -->
                <template data-template>
                    <div class="card">
                        <header>
                            <h2 data-class-name>JSS 2 <span data-class-section></span></h2>
                            <p>Junior Secondary School 2</p>
                        </header>
                        <div class="body">
                            <p>Teacher: <span data-teacher-name>Mr John</span></p>
                            <p>Students: <span data-student-no>45</span></p>
                        </div>
                        <div class="footer">
    <div class="viewBtn cardBtnIcon view-btn" data-type="class" data-id="">
        <i class="fas fa-eye"></i>
    </div>
    <div class="editBtn cardBtnIcon">
        <i class="fas fa-edit"></i> >     </div>
    <div class="deleteBtn cardBtnIcon">
        <i class="fas fa-trash"></i> >     </div>
</div>
                    </div>
                </template>
            </div>
        </section>
    </div>

    <!-- Create / Edit Class Modal -->
    <div class="modal" id="createClassModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Class</h2>
                <button class="modal-close" id="closeModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="createClassForm">
                <div class="form-group">
                    <label for="className">Class Name</label>
                    <input type="text" id="className" required placeholder="e.g., Junior Secondary School 1" />
                    <input type="text" id="newClassTitle" placeholder="Enter new class name"
                        style="display:none; margin-top: 10px;" />
                </div>
                <div class="form-group">
                    <label for="section">Section</label>
                    <input type="text" id="section" required placeholder="e.g., A, B, C, Sci, Sci 1" />
                </div>
                <div class="form-group">
                    <label for="teacherSelect">Teacher Name</label>
                    <div class="searchable-dropdown">
                        <input type="text" id="teacherSearchInput" placeholder="Search teachers..." autocomplete="off"
                            data-searchBar>
                        <div class="dropdown-options" id="teacherDropdownOptions" data-dropDownBox>
                            <!-- Options will be populated by JS -->
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="studentsCount">Number of Students</label>
                    <input type="number" id="studentsCount" required min="0" value="0" />
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn-primary" data-create-class>Create Class</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Shared overlay -->
    <div class="overlay" id="overlay"></div>

    <!-- ── View Class Modal ── -->
    <div id="viewClassModal" class="modal-overlay" style="display: none;">
        <div class="full-view-modal">

            <div class="modal-header">
                <h2 id="viewClassNameDisplay">Class Details</h2>
                <button class="modal-close" onclick="window.closeViewModal()">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>

            <div class="view-modal-body">
                <div class="view-info-row">
                    <span class="view-info-label"><i class="fas fa-user-tie"></i> Class Teacher</span>
                    <span class="view-info-value" id="viewTeacherName">N/A</span>
                </div>
                <div class="view-info-row">
                    <span class="view-info-label"><i class="fas fa-users"></i> Total Students</span>
                    <span class="view-info-value" id="viewStudentCount">0</span>
                </div>
            </div>

            <div class="view-modal-footer">
                <button class="btn-secondary" onclick="window.closeViewModal()">Close</button>
            </div>

        </div>
    </div>

    <input type="hidden" id="editClassId">

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="../../assets/js-shared/sideBar.js"></script>

    <script type="module" src="./classes_scripts/classes_excel_upload.js"></script>
    <script type="module" src="./classes_scripts/classes.js"></script>
    <script type="module" src="./classes_scripts/searchableDropdown.js"></script>
    <script type="module" src="./classes_scripts/render_classes.js"></script>
    
    <!-- Global Details Modal -->
    <script type="module" src="../../core/universalRouter.js"></script>
</body>

</html>
