<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - EduHub</title>
    <meta name="description" content="Sign in to your EduHub account to manage your school.">
    <link rel="stylesheet" href="../styles/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <i class="fas fa-graduation-cap"></i>
                    <span>EduHub</span>
                </div>
                <h1>Welcome Back</h1>
                <p>Sign in to your account to continue managing your school</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required 
                           placeholder="Enter your email address"
                           autocomplete="email">
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="password-input">
                        <input type="password" id="password" name="password" required 
                               placeholder="Enter your password"
                           autocomplete="current-password">
                        <button type="button" class="password-toggle" id="passwordToggle">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-group checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember" name="remember">
                        <span class="checkmark"></span>
                        Remember me
                    </label>
                    <a href="forgot-password.html" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                    <div class="loading-spinner" style="display: none;"></div>
                    <span id="btnText">Sign In</span>
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from '../scripts/config.js';

        class LoginForm {
            constructor() {
                this.form = document.getElementById('loginForm');
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.checkForMessages();
                this.checkExistingSession();
            }

            setupEventListeners() {
                // Form submission
                this.form.addEventListener('submit', (e) => this.handleSubmit(e));

                // Password visibility toggle
                document.getElementById('passwordToggle').addEventListener('click', () => {
                    this.togglePasswordVisibility();
                });

                // Real-time validation
                document.getElementById('email').addEventListener('blur', () => this.validateEmail());
            }

            checkForMessages() {
                const urlParams = new URLSearchParams(window.location.search);
                const message = urlParams.get('message');
                
                if (message) {
                    switch (message) {
                        case 'email_confirmation':
                            this.showSuccess('Please check your email to confirm your account before signing in.');
                            break;
                        case 'password_reset':
                            this.showSuccess('Your password has been reset. Please sign in with your new password.');
                            break;
                        case 'account_created':
                            this.showSuccess('Account created successfully! Please sign in.');
                            break;
                        case 'session_expired':
                            this.showError('Your session has expired. Please sign in again.');
                            break;
                    }
                }
            }

            async checkExistingSession() {
                try {
                    const { data: { session }, error } = await supabase.auth.getSession();
                    
                    if (session && !error) {
                        // User is already authenticated, redirect to appropriate portal
                        this.redirectUser(session.user);
                    }
                } catch (error) {
                    console.error('Session check error:', error);
                }
            }

            togglePasswordVisibility() {
                const passwordField = document.getElementById('password');
                const toggle = document.getElementById('passwordToggle');
                const icon = toggle.querySelector('i');

                if (passwordField.type === 'password') {
                    passwordField.type = 'text';
                    icon.className = 'fas fa-eye-slash';
                } else {
                    passwordField.type = 'password';
                    icon.className = 'fas fa-eye';
                }
            }

            async handleSubmit(e) {
                e.preventDefault();

                if (!this.validateForm()) {
                    return;
                }

                const submitBtn = document.getElementById('loginBtn');
                const btnText = document.getElementById('btnText');
                const spinner = submitBtn.querySelector('.loading-spinner');

                try {
                    // Show loading state
                    submitBtn.disabled = true;
                    spinner.style.display = 'inline-block';
                    btnText.textContent = 'Signing In...';

                    const formData = new FormData(this.form);
                    const email = formData.get('email');
                    const password = formData.get('password');
                    const remember = formData.get('remember');

                    // Sign in user
                    const { data, error } = await supabase.auth.signInWithPassword({
                        email,
                        password,
                        options: {
                            // Set session duration based on remember me
                            expiresIn: remember ? 60 * 60 * 24 * 30 : 60 * 60 * 24 * 7 // 30 days or 7 days
                        }
                    });

                    if (error) {
                        throw new Error(this.getErrorMessage(error.message));
                    }

                    if (data.user && data.session) {
                        // Successful login
                        this.showSuccess('Login successful! Redirecting...');
                        
                        // Redirect user to appropriate portal
                        setTimeout(() => {
                            this.redirectUser(data.user);
                        }, 1000);
                    }

                } catch (error) {
                    console.error('Login error:', error);
                    this.showError(error.message || 'Failed to sign in. Please try again.');
                } finally {
                    // Reset button state
                    submitBtn.disabled = false;
                    spinner.style.display = 'none';
                    btnText.textContent = 'Sign In';
                }
            }

            getErrorMessage(error) {
                const errorMessages = {
                    'Invalid login credentials': 'Invalid email or password. Please try again.',
                    'Email not confirmed': 'Please check your email to confirm your account before signing in.',
                    'Too many requests': 'Too many login attempts. Please try again later.',
                    'User not found': 'No account found with this email address.',
                    'Invalid password': 'Incorrect password. Please try again.'
                };

                return errorMessages[error] || error;
            }

            redirectUser(user) {
                const userMetadata = user.user_metadata || {};
                const userType = userMetadata.user_type;
                const schoolId = userMetadata.school_id;

                console.log('Redirecting user:', { userType, schoolId });

                // Redirect logic based on user state
                if (userType === 'pending' || !schoolId) {
                    // User needs to complete onboarding
                    window.location.href = 'onboarding.html';
                    return;
                }

                if (userType === 'school_admin' && schoolId) {
                    // School admin with completed onboarding
                    window.location.href = '../../html/schoolAdmin/schoolAdminDashboard.html';
                    return;
                }

                if (userType === 'teacher' && schoolId) {
                    // Teacher user
                    window.location.href = '../../html/teachersPortal/teachersPortalDashboard.html';
                    return;
                }

                if (userType === 'student' && schoolId) {
                    // Student user
                    window.location.href = '../../html/studentsPortal/studentsPortalDashboard.html';
                    return;
                }

                if (userType === 'parent' && schoolId) {
                    // Parent user
                    window.location.href = '../../html/parentsPortal/parentsPortalDashboard.html';
                    return;
                }

                // Fallback to onboarding if user type is unknown
                console.warn('Unknown user type or missing school_id, redirecting to onboarding');
                window.location.href = 'onboarding.html';
            }

            validateForm() {
                let isValid = true;

                // Validate email
                if (!this.validateEmail()) {
                    isValid = false;
                }

                // Validate password
                const password = document.getElementById('password').value;
                if (password.length === 0) {
                    this.showFieldError('password', 'Password is required');
                    isValid = false;
                } else {
                    this.clearFieldError('password');
                }

                return isValid;
            }

            validateEmail() {
                const email = document.getElementById('email').value.trim();
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

                if (!email) {
                    this.showFieldError('email', 'Email address is required');
                    return false;
                }

                if (!emailRegex.test(email)) {
                    this.showFieldError('email', 'Please enter a valid email address');
                    return false;
                }

                this.clearFieldError('email');
                return true;
            }

            showFieldError(fieldId, message) {
                const errorElement = document.getElementById(fieldId + 'Error');
                const fieldElement = document.getElementById(fieldId);
                
                errorElement.textContent = message;
                fieldElement.classList.add('error');
            }

            clearFieldError(fieldId) {
                const errorElement = document.getElementById(fieldId + 'Error');
                const fieldElement = document.getElementById(fieldId);
                
                errorElement.textContent = '';
                fieldElement.classList.remove('error');
            }

            showError(message) {
                this.showMessage(message, 'error');
            }

            showSuccess(message) {
                this.showMessage(message, 'success');
            }

            showMessage(message, type) {
                // Remove any existing messages
                const existingMessage = document.querySelector('.auth-message');
                if (existingMessage) {
                    existingMessage.remove();
                }

                // Create message element
                const messageEl = document.createElement('div');
                messageEl.className = `auth-message ${type}`;
                messageEl.textContent = message;
                
                // Add styles
                messageEl.style.cssText = `
                    padding: 12px 16px;
                    border-radius: 8px;
                    margin-bottom: 20px;
                    font-size: 14px;
                    display: flex;
                    align-items: center;
                    gap: 8px;
                    ${type === 'error' ? 'background: #fef2f2; color: #dc2626; border: 1px solid #fecaca;' : 'background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0;'}
                `;
                
                // Add icon
                const icon = document.createElement('i');
                icon.className = type === 'error' ? 'fas fa-exclamation-circle' : 'fas fa-check-circle';
                messageEl.insertBefore(icon, messageEl.firstChild);
                
                // Insert after header
                const header = document.querySelector('.auth-header');
                header.parentNode.insertBefore(messageEl, header.nextSibling);
                
                // Auto-remove after 5 seconds
                setTimeout(() => {
                    messageEl.remove();
                }, 5000);
            }
        }

        // Initialize login form
        new LoginForm();
    </script>

    <style>
        .password-input {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #6b7280;
            cursor: pointer;
            padding: 4px;
        }

        .password-toggle:hover {
            color: #374151;
        }

        .checkbox-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .checkbox-label input[type="checkbox"] {
            display: none;
        }

        .checkmark {
            width: 16px;
            height: 16px;
            border: 2px solid #d1d5db;
            border-radius: 4px;
            flex-shrink: 0;
            position: relative;
            transition: all 0.2s ease;
        }

        .checkbox-label input[type="checkbox"]:checked + .checkmark {
            background: #6200ea;
            border-color: #6200ea;
        }

        .checkbox-label input[type="checkbox"]:checked + .checkmark::after {
            content: '✓';
            position: absolute;
            top: -2px;
            left: 2px;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .forgot-password {
            color: #6200ea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .form-input.error {
            border-color: #ef4444;
        }

        .error-message {
            color: #ef4444;
            font-size: 12px;
            margin-top: 4px;
            display: block;
        }

        .btn-full {
            width: 100%;
            justify-content: center;
        }

        .loading-spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</body>
</html>
