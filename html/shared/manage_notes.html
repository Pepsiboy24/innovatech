<!DOCTYPE html>
<html lang="en">

<head>
    <script type="module" src="../../scripts/auth_guard_shared.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Notes – EduHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Admin portal styles (sidebar + layout) -->
    <link rel="stylesheet" href="../../styles/schoolAdminStyles/schoolAdminDashboard.css">
    <!-- Teacher portal styles (sidebar + layout) -->
    <link rel="stylesheet" href="../../styles/teachersPortalStyles/teachersPortal.css">
    <link rel="stylesheet" href="../../styles/teachersPortalStyles/sidebar.css">
    <style>
        /* ── Local overrides ───────────────────────────────────── */
        .meta-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .note-count {
            font-size: 13px;
            color: #64748b;
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 20px;
        }

        /* Search */
        .search-box {
            position: relative;
        }

        .search-box i {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 14px;
            pointer-events: none;
        }

        .search-box input {
            padding: 8px 12px 8px 34px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            width: 280px;
            font-family: inherit;
            transition: border-color .2s, box-shadow .2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, .12);
        }

        /* Card & table */
        .card {
            background: #fff;
            border-radius: 14px;
            padding: 28px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .06);
        }

        .table-wrap {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        thead th {
            background: #f8fafc;
            padding: 12px 16px;
            text-align: left;
            font-weight: 600;
            color: #475569;
            border-bottom: 1px solid #e2e8f0;
            white-space: nowrap;
        }

        tbody tr {
            border-bottom: 1px solid #f1f5f9;
            transition: background .15s;
        }

        tbody tr:hover {
            background: #f8fafc;
        }

        tbody td {
            padding: 13px 16px;
            color: #334155;
            vertical-align: middle;
        }

        .title-cell {
            font-weight: 500;
            max-width: 220px;
        }

        .empty-state {
            text-align: center;
            color: #94a3b8;
            padding: 48px 0;
            font-size: 14px;
        }

        /* Buttons */
        .actions-cell {
            white-space: nowrap;
        }

        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: filter .15s, opacity .15s;
        }

        .btn:hover {
            filter: brightness(1.08);
        }

        .btn:disabled {
            opacity: .5;
            cursor: not-allowed;
            filter: none;
        }

        .btn-view {
            background: #eff6ff;
            color: #2563eb;
        }

        .btn-delete {
            background: #fef2f2;
            color: #dc2626;
            margin-left: 6px;
        }

        /* Uploader column — JS reveals for ADMIN role */
        #uploaderHeader {
            display: none;
        }

        /* ── Delete modal ──────────────────────────────────────── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: #fff;
            border-radius: 16px;
            padding: 32px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .2);
        }

        .modal-icon {
            width: 48px;
            height: 48px;
            background: #fef2f2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #dc2626;
            margin-bottom: 16px;
        }

        .modal h3 {
            font-size: 19px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .modal p {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-cancel {
            background: #f1f5f9;
            color: #475569;
        }

        .btn-confirm {
            background: #dc2626;
            color: #fff;
        }
    </style>
</head>

<body>
    <!-- Sidebar (injected by school_admin_sidebar.js) -->
    <div class="sidebar" data-sideBar></div>

    <div class="container">
        <div class="main">

            <!-- Page header — text set dynamically by manage_notes.js -->
            <div class="header">
                <div>
                    <h1 class="page-title" id="pageTitle">Manage Notes</h1>
                    <p class="page-subtitle" id="pageSubtitle">Loading…</p>
                </div>
            </div>

            <div class="card">
                <!-- Toolbar -->
                <div class="meta-bar">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="searchInput" placeholder="Search title, class, or subject…">
                    </div>
                    <span class="note-count" id="noteCount">—</span>
                </div>

                <!-- Notes table -->
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Class</th>
                                <th>Subject</th>
                                <th>Date Uploaded</th>
                                <th id="uploaderHeader">Uploaded By</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="notesBody">
                            <tr id="loadingRow">
                                <td colspan="5" class="empty-state">
                                    <i class="fas fa-spinner fa-spin"></i>&nbsp; Loading notes…
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>

    <!-- Delete confirmation modal -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <div class="modal-icon"><i class="fas fa-trash-alt"></i></div>
            <h3>Delete this note?</h3>
            <p>
                This will permanently remove the note file from storage
                <em>and</em> its database record. If the file cannot be
                deleted, the record will be kept safe — no broken links.
            </p>
            <div class="modal-actions">
                <button class="btn btn-cancel" id="cancelDelete">Cancel</button>
                <button class="btn btn-confirm" id="confirmDelete">
                    <i class="fas fa-trash-alt"></i> Delete
                </button>
            </div>
        </div>
    </div>

    <!-- Data script (ES module) -->
    <script type="module" src="../../scripts/manage_notes.js"></script>
    <script type="module" src="../../scripts/manage_notes_sidebar.js"></script>
</body>

</html>
