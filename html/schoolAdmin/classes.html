<!DOCTYPE html>
<html lang="en">

<head>
    <script type="module" src="../../scripts/authGuard.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classes Management - EduHubAdmin</title>
    <link rel="stylesheet" href="../../styles/schoolAdminStyles/classes.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="../../scripts/schoolAdminScripts/school_admin_sidebar.js" defer></script>
</head>

<body>
    <!-- Sidebar -->
    <div class="sidebar" data-sideBar></div>

    <!-- Main Content -->
    <div class="main">
        <div class="header">
            <div class="header-left">
                <div class="icon mobile-menu-btn" data-sideBarOpen><i class="fa fa-bars"></i></div>
                <div>
                    <h1 class="page-title">My Classes</h1>
                    <p class="page-subtitle">Manage your classes and sections</p>
                </div>
            </div>
            <div class="header-right">
                <div class="search-container">
                    <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    <input type="text" class="search-input" placeholder="Search classes...">
                </div>
                <div class="profile"></div>
            </div>
        </div>

        <!-- Classes Section -->
        <section class="classes-section">
            <div class="section-header">
                <div class="header-actions">
                    <input type="file" id="csvUpload" accept=".csv" style="display: none;" />
                    <button class="btn-secondary" id="uploadCsvBtn">
                        <i class="fas fa-upload"></i>
                        <span>Upload CSV</span>
                    </button>
                    <button class="btn-primary" id="createClassBtn">
                        <i class="fas fa-plus"></i>
                        <span>Create New Class</span>
                    </button>
                </div>
            </div>

            <div class="classes-grid" id="classesGrid" data-container>
                <!-- Classes will be dynamically loaded here -->
                <template data-template>
                    <div class="card">
                        <header>
                            <h2 data-class-name>JSS 2 <span data-class-section></span></h2>
                            <p>Junior Secondary School 2</p>
                        </header>
                        <div class="body">
                            <p>Teacher: <span data-teacher-name>Mr John</span></p>
                            <p>Students: <span data-student-no>45</span></p>
                        </div>
                        <div class="footer">
                            <div class="editBtn cardBtnIcon">
                                <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                    <path
                                        d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z" />
                                </svg>
                            </div>
                            <div class="viewBtn cardBtnIcon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="lucide lucide-eye">
                                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7-10-7-10-7Z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </div>
                            <div class="deleteBtn cardBtnIcon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#ef4444"
                                    viewBox="0 0 16 16">
                                    <path
                                        d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z" />
                                    <path fill-rule="evenodd"
                                        d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </section>
    </div>

    <!-- Create / Edit Class Modal -->
    <div class="modal" id="createClassModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create New Class</h2>
                <button class="modal-close" id="closeModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="createClassForm">
                <div class="form-group">
                    <label for="className">Class Name</label>
                    <input type="text" id="className" required placeholder="e.g., Junior Secondary School 1" />
                    <input type="text" id="newClassTitle" placeholder="Enter new class name"
                        style="display:none; margin-top: 10px;" />
                </div>
                <div class="form-group">
                    <label for="section">Section</label>
                    <input type="text" id="section" required placeholder="e.g., A, B, C, Sci, Sci 1" />
                </div>
                <div class="form-group">
                    <label for="teacherSelect">Teacher Name</label>
                    <div class="searchable-dropdown">
                        <input type="text" id="teacherSearchInput" placeholder="Search teachers..." autocomplete="off"
                            data-searchBar>
                        <div class="dropdown-options" id="teacherDropdownOptions" data-dropDownBox>
                            <!-- Options will be populated by JS -->
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="studentsCount">Number of Students</label>
                    <input type="number" id="studentsCount" required min="0" value="0" />
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancelBtn">Cancel</button>
                    <button type="submit" class="btn-primary" data-create-class>Create Class</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Shared overlay -->
    <div class="overlay" id="overlay"></div>

    <!-- ── View Class Modal ── -->
    <div id="viewClassModal" class="modal-overlay" style="display: none;">
        <div class="full-view-modal">

            <div class="modal-header">
                <h2 id="viewClassNameDisplay">Class Details</h2>
                <button class="modal-close" onclick="window.closeViewModal()">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>

            <div class="view-modal-body">
                <div class="view-info-row">
                    <span class="view-info-label"><i class="fas fa-user-tie"></i> Class Teacher</span>
                    <span class="view-info-value" id="viewTeacherName">N/A</span>
                </div>
                <div class="view-info-row">
                    <span class="view-info-label"><i class="fas fa-users"></i> Total Students</span>
                    <span class="view-info-value" id="viewStudentCount">0</span>
                </div>
            </div>

            <div class="view-modal-footer">
                <button class="btn-secondary" onclick="window.closeViewModal()">Close</button>
            </div>

        </div>
    </div>

    <input type="hidden" id="editClassId">

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="../../scripts/sideBar.js"></script>

    <script type="module" src="../../scripts/schoolAdminScripts/classes_scripts/csvUpload.js"></script>
    <script type="module" src="../../scripts/schoolAdminScripts/classes_scripts/classes.js"></script>
    <script type="module" src="../../scripts/schoolAdminScripts/classes_scripts/searchableDropdown.js"></script>
    <script type="module" src="../../scripts/schoolAdminScripts/classes_scripts/render_classes.js"></script>

</body>

</html>
