<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EdTech - Teachers Portal</title>
    <link rel="stylesheet" href="../../styles/teachersPortalStyles/sidebar.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            height: 100vh;
            background: #f5f5f5;
            overflow: hidden;
        }

        .mobile-header {
            display: none;
            background: white;
            padding: 16px 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            align-items: center;
            justify-content: space-between;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .hamburger {
            width: 30px;
            height: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
        }

        .hamburger span {
            width: 100%;
            height: 3px;
            background: #1a1a1a;
            border-radius: 2px;
            transition: all 0.3s;
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
        }

        .sidebar-overlay.active {
            display: block;
        }

        .sidebar {
            width: 260px;
            background: white;
            padding: 30px 20px;
            box-shadow: 2px 0 5px rgba(0, 0, 0, 0.05);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
            position: relative;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 40px;
            color: #1a1a1a;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            margin-bottom: 8px;
            color: #666;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .nav-item:hover {
            background: #f0f7ff;
            color: #4a90e2;
        }

        .nav-item.active {
            background: #e8f4ff;
            color: #4a90e2;
        }

        .nav-item svg {
            width: 20px;
            height: 20px;
            margin-right: 12px;
        }

        .user-section {
            margin-top: auto;
            padding-top: 20px;
            border-top: 1px solid #e5e5e5;
        }

        .user-info {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            margin-right: 12px;
        }

        .logout-btn {
            width: 100%;
            padding: 12px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 32px;
            color: #1a1a1a;
            margin-bottom: 8px;
        }

        .header .date {
            color: #999;
            font-size: 14px;
        }

        .section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .subject-dropdown {
            padding: 8px 16px;
            border: 1px solid #e5e5e5;
            border-radius: 6px;
            background: white;
            color: #666;
            cursor: pointer;
            font-size: 14px;
        }

        .completion-text {
            color: #999;
            font-size: 14px;
            margin-left: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #fafafa;
        }

        th {
            text-align: left;
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 20px 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        .topic-name {
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 4px;
        }

        .topic-desc {
            font-size: 13px;
            color: #999;
        }

        .status {
            display: inline-flex;
            align-items: center;
            font-size: 14px;
            font-weight: 500;
        }

        .status.completed {
            color: #27ae60;
        }

        .status.pending {
            color: #95a5a6;
        }

        .status svg {
            width: 16px;
            height: 16px;
            margin-right: 6px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #f0f0f0;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #27ae60;
            transition: width 0.3s;
        }

        .progress-text {
            font-size: 14px;
            color: #666;
            margin-left: 8px;
        }

        .action-btn {
            padding: 8px 16px;
            background: transparent;
            color: #4a90e2;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .action-btn:hover {
            background: #f0f7ff;
        }

        /* Responsive Styles */
        @media (max-width: 1024px) {
            .main-content {
                padding: 30px;
            }

            table {
                font-size: 14px;
            }

            th,
            td {
                padding: 12px 10px;
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .mobile-header {
                display: flex;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                transform: translateX(-100%);
                z-index: 1001;
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .main-content {
                margin-top: 60px;
                padding: 20px;
                width: 100%;
                height: calc(100vh - 60px);
                overflow-y: auto;
            }

            .header h1 {
                font-size: 24px;
            }

            .section {
                padding: 20px;
            }

            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 12px;
            }

            .subject-dropdown {
                width: 100%;
            }

            /* Hide table headers on mobile */
            thead {
                display: none;
            }

            /* Make table scrollable on mobile */
            table {
                display: block;
                width: 100%;
            }

            tbody {
                display: block;
                width: 100%;
            }

            /* Convert rows to cards */
            tr {
                display: block;
                margin-bottom: 20px;
                border: 1px solid #e5e5e5;
                border-radius: 8px;
                padding: 16px;
                background: white;
            }

            td {
                display: block;
                padding: 12px 0;
                border: none;
                text-align: left;
            }

            /* Add labels before each cell */
            td[data-label]:not(:first-child)::before {
                content: attr(data-label) ": ";
                font-weight: 600;
                color: #666;
                font-size: 12px;
                text-transform: uppercase;
                display: block;
                margin-bottom: 4px;
            }

            /* First cell (topic) styling */
            td:first-child {
                padding-bottom: 16px;
                border-bottom: 1px solid #f0f0f0;
                margin-bottom: 12px;
            }

            /* Progress bar full width on mobile */
            td[data-label="Progress"]>div {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }

            .progress-bar {
                width: 100% !important;
            }

            .progress-text {
                margin-left: 0 !important;
            }

            /* Action button full width */
            .action-btn {
                width: 100%;
                margin-top: 8px;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 20px;
            }

            .section-title {
                font-size: 18px;
            }

            .logo {
                font-size: 20px;
            }

            .nav-item {
                font-size: 14px;
            }

            td {
                font-size: 13px;
            }
        }
    </style>
</head>

<body>
    <div class="mobile-header">
        <div class="hamburger" onclick="toggleSidebar()">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="logo">EdTech</div>
        <div style="width: 30px;"></div>
    </div>

    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <div class="sidebar" data-sideBar>
        <!-- Dynamic Content -->
    </div>

    <div class="main-content">
        <div class="header">
            <h1>Welcome back, Mrs.Johnson</h1>
            <div class="date">Saturday, January 24, 2026</div>
        </div>

        <div class="section">
            <div class="section-header">
                <div>
                    <span class="section-title">Scheme of Work</span>
                    <span class="completion-text">0 of 0 topics completed</span>
                </div>
                <div style="display: flex; gap: 10px;">
                    <select id="classSelect" class="subject-dropdown">
                        <option value="">Select Class</option>
                    </select>
                    <select id="subjectSelect" class="subject-dropdown">
                        <option value="">Select Subject</option>
                    </select>
                    <input type="file" id="curriculumUpload" accept=".xlsx" style="display: none;">
                    <button id="uploadBtn" class="action-btn" style="background: #4a90e2; color: white;">
                        Upload Scheme
                    </button>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>TOPIC NAME</th>
                        <th>WEEK</th>
                        <th>STATUS</th>
                        <th>PROGRESS</th>
                        <th>ACTION</th>
                    </tr>
                </thead>
                <tbody id="curriculumTableBody">
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 20px;">Please select a Class and Subject to
                            view the Scheme of Work.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://unpkg.com/read-excel-file@5.x/bundle/read-excel-file.min.js"></script>
    <script type="module" src="../../scripts/teachersPortalScripts/curriculum.js"></script>
    <script src="../../scripts/teachersPortalScripts/teachers_portal_sidebar.js"></script>
</body>

</html>
