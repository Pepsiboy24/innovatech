<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Attendance - EdTech</title>
    <link rel="stylesheet" href="../../styles/teachersPortalStyles/attendance.css">
</head>
<body>
    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <header>
            <h4>EdTech</h4>
            <button class="close-btn" id="closeSidebar">✕</button>
        </header>
        
        <div class="content">
            <ul>
                <div class="item">
                    <li><a href="./teachersPortal.html">🏠 Home</a></li>
                </div>
                <div class="item">
                    <li><a href="./listOfStudents.html">👥 Students</a></li>
                </div>
                <div class="item">
                    <li><a href="#" class="active">📋 Attendance</a></li>
                </div>
                <div class="item">
                    <li><a href="#">🤖 AI Assistant</a></li>
                </div>
            </ul>
            
            <div class="profile-settings">
                <div class="user-settings">
                    <a href="#"><i>👤</i> <span>UserName</span></a>
                </div>
                <div class="logout">
                    <button>Logout</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Header -->
        <header class="header">
            <div class="welcome-msg">
                <h2>Welcome back, <span>Mrs</span>.<span>Johnson</span></h2>
                <p>Tuesday, 15 September 2025</p>
            </div>
            <div class="header-right">
                <button class="notification-btn">🔔</button>
                <button class="menu-btn" id="openSidebar">☰</button>
            </div>
        </header>

        <!-- Attendance Section -->
        <section class="attendance-section">
            <div class="section-header">
                <h3 class="section-title">Class Attendance</h3>
                <div class="date-class-selector">
                    <input type="date" class="date-input" value="2025-09-15">
                    <select class="class-select">
                        <!-- Options will be populated dynamically -->
                    </select>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="quick-actions">
                <button class="quick-action-btn" onclick="markAllPresent()">Mark All Present</button>
                <button class="quick-action-btn" onclick="markAllAbsent()">Mark All Absent</button>
                <button class="quick-action-btn" onclick="clearAll()">Clear All</button>
            </div>

            <!-- Attendance Summary -->
            <div class="attendance-summary">
                <div class="summary-item present">
                    <div class="summary-number" id="presentCount">0</div>
                    <div class="summary-label">Present</div>
                </div>
                <div class="summary-item absent">
                    <div class="summary-number" id="absentCount">0</div>
                    <div class="summary-label">Absent</div>
                </div>
                <div class="summary-item late">
                    <div class="summary-number" id="lateCount">0</div>
                    <div class="summary-label">Late</div>
                </div>
                <div class="summary-item">
                    <div class="summary-number" id="totalCount">6</div>
                    <div class="summary-label">Total</div>
                </div>
            </div>

            <table class="attendance-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Attendance</th>
                        <th>Remarks (Optional)</th>
                    </tr>
                </thead>
                <tbody id="attendanceTableBody">
                    <!-- Students will be loaded dynamically here -->
                </tbody>
            </table>

            <div class="action-buttons">
                <button class="cancel-btn">Cancel</button>
                <button class="save-btn">Save Attendance</button>
            </div>
        </section>
    </main>

    <script>
        // Sidebar functionality
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');
        const openSidebarBtn = document.getElementById('openSidebar');
        const closeSidebarBtn = document.getElementById('closeSidebar');

        function openSidebar() {
            sidebar.classList.add('mobile-visible');
            sidebarOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeSidebar() {
            sidebar.classList.remove('mobile-visible');
            sidebarOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        openSidebarBtn.addEventListener('click', openSidebar);
        closeSidebarBtn.addEventListener('click', closeSidebar);
        sidebarOverlay.addEventListener('click', closeSidebar);


        // Close sidebar on escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeSidebar();
            }
        });

        // Handle window resize
        window.addEventListener('resize', function() {
            if (window.innerWidth > 768) {
                closeSidebar();
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script> 
    <script type="module" src="../../scripts/teachersPortalScripts/attendace.js"></script>
</body>
</html>
