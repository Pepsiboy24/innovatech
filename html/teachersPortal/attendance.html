<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Attendance - EdTech</title>
    <link rel="stylesheet" href="../../styles/teachersPortalStyles/teachersPortal.css">
    <link rel="stylesheet" href="../../styles/teachersPortalStyles/attendance.css">
    <link rel="stylesheet" href="../../styles/teachersPortalStyles/sidebar.css">
</head>

<body>
    <!-- Sidebar -->
    <!-- Sidebar -->
    <nav class="sidebar" data-sideBar>
        <!-- Dynamic Content -->
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <h1>Class Attendance</h1>
                <p>Manage daily attendance</p>
            </div>
            <div class="header-right">
                <button class="notification-btn"><i class="fa fa-bell"></i></button>
                <div class="user-avatar">MA</div>
                <div class="navOpenIcon" data-nav-dispaly><i class="fa fa-bars" data-ie></i></div>
            </div>
        </header>

        <!-- Attendance Section -->
        <section class="attendance-section">
            <div class="section-header">
                <!-- <h3 class="section-title">Class Attendance</h3> -->
                <div class="date-class-selector">
                    <input type="date" class="date-input" value="2025-09-15">
                    <select class="class-select">
                        <!-- Options will be populated dynamically -->
                    </select>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="quick-actions">
                <button class="quick-action-btn" onclick="markAllPresent()">Mark All Present</button>
                <button class="quick-action-btn" onclick="markAllAbsent()">Mark All Absent</button>
                <button class="quick-action-btn" onclick="clearAll()">Clear All</button>
            </div>

            <!-- Attendance Summary -->
            <div class="attendance-summary">
                <div class="summary-item present">
                    <div class="summary-number" id="presentCount">0</div>
                    <div class="summary-label">Present</div>
                </div>
                <div class="summary-item absent">
                    <div class="summary-number" id="absentCount">0</div>
                    <div class="summary-label">Absent</div>
                </div>
                <div class="summary-item late">
                    <div class="summary-number" id="lateCount">0</div>
                    <div class="summary-label">Late</div>
                </div>
                <div class="summary-item">
                    <div class="summary-number" id="totalCount">0</div>
                    <div class="summary-label">Total</div>
                </div>
            </div>

            <table class="attendance-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Attendance</th>
                        <th>Remarks (Optional)</th>
                    </tr>
                </thead>
                <tbody id="attendanceTableBody">
                    <!-- Students will be loaded dynamically here -->
                </tbody>
            </table>

            <div class="action-buttons">
                <!-- <button class="cancel-btn">Cancel</button> -->
                <button class="save-btn">Save Attendance</button>
            </div>
        </section>
    </main>
    <script src="../../scripts/fontawesome.js"></script>
    <script>
        const navOpen = document.querySelector("[data-nav-dispaly]");
        const nav = document.querySelector("[data-nav]");
        const i = document.querySelector("[data-ie]")
        navOpen.addEventListener("click", () => {
            if (i.className == "fa fa-bars") {
                i.className = "";
                i.classList.add("fa", "fa-times");
            } else if (i.className == "fa fa-times") {
                i.className = "";
                i.classList.add("fa", "fa-bars");
            }
            nav.classList.toggle("show")
        })
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="module" src="../../scripts/teachersPortalScripts/attendace.js"></script>
    <script src="../../scripts/teachersPortalScripts/teachers_portal_sidebar.js"></script>
</body>

</html>
