<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class Attendance — TeachSmart</title>
    <link rel="stylesheet" href="../../styles/teachersPortalStyles/sidebar.css">
    <link rel="stylesheet" href="../../styles/teachersPortalStyles/tp-shared.css">
    <link rel="stylesheet" href="../../styles/teachersPortalStyles/attendance.css">
</head>

<body>
    <!-- Mobile Top Bar -->
    <div class="mobile-top-bar" id="mobileTopBar">
        <span class="brand">TeachSmart</span>
        <button class="hamburger-btn" id="hamburgerBtn" aria-label="Toggle sidebar">
            <span></span><span></span><span></span>
        </button>
    </div>

    <!-- Sidebar Overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <nav class="sidebar" data-sideBar></nav>

    <!-- Main Content -->
    <main class="main-content">

        <!-- Page Header -->
        <div class="page-header">
            <h1>Class Attendance</h1>
            <p>Mark and manage daily student attendance</p>
        </div>

        <!-- Attendance Section -->
        <div class="tp-card">
            <div class="tp-section-header">
                <div class="tp-filters-row">
                    <input type="date" class="tp-input date-input">
                    <select class="tp-select class-select">
                        <!-- Options populated dynamically -->
                    </select>
                </div>

                <!-- Quick Actions -->
                <div class="quick-actions">
                    <button class="tp-btn tp-btn-outline" onclick="markAllPresent()">✔ Mark All Present</button>
                    <button class="tp-btn tp-btn-outline" onclick="markAllAbsent()">✘ Mark All Absent</button>
                    <button class="tp-btn tp-btn-outline" onclick="clearAll()">↺ Clear All</button>
                </div>
            </div>

            <!-- Attendance Summary -->
            <div class="attendance-summary">
                <div class="summary-item present">
                    <div class="summary-number" id="presentCount">0</div>
                    <div class="summary-label">Present</div>
                </div>
                <div class="summary-item absent">
                    <div class="summary-number" id="absentCount">0</div>
                    <div class="summary-label">Absent</div>
                </div>
                <div class="summary-item late">
                    <div class="summary-number" id="lateCount">0</div>
                    <div class="summary-label">Late</div>
                </div>
                <div class="summary-item">
                    <div class="summary-number" id="totalCount">0</div>
                    <div class="summary-label">Total</div>
                </div>
            </div>

            <table class="tp-table attendance-table">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Attendance</th>
                        <th>Remarks (Optional)</th>
                    </tr>
                </thead>
                <tbody id="attendanceTableBody">
                    <!-- Students loaded dynamically -->
                </tbody>
            </table>

            <div class="tp-actions-row" style="justify-content:flex-end;">
                <button class="tp-btn tp-btn-primary save-btn">Save Attendance</button>
            </div>
        </div>

    </main>

    <script src="../../scripts/fontawesome.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script type="module" src="../../scripts/teachersPortalScripts/attendace.js"></script>
    <script src="../../scripts/teachersPortalScripts/teachers_portal_sidebar.js"></script>
    <script>
        (function () {
            const btn = document.getElementById('hamburgerBtn');
            const sidebar = document.querySelector('[data-sideBar]');
            const overlay = document.getElementById('sidebarOverlay');
            const open = () => { sidebar.classList.add('active'); overlay.classList.add('active'); };
            const close = () => { sidebar.classList.remove('active'); overlay.classList.remove('active'); };
            if (btn) btn.addEventListener('click', () => sidebar.classList.contains('active') ? close() : open());
            overlay.addEventListener('click', close);
            document.addEventListener('keydown', e => { if (e.key === 'Escape') close(); });
            window.addEventListener('resize', () => { if (window.innerWidth > 768) close(); });
        })();
    </script>
</body>

</html>
