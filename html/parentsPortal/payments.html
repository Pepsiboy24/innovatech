<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <script type="module" src="../../scripts/authGuard.js"></script>
    <meta charset="UTF-8">

    <title>School Payments - EduPay Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css?v=1.1">
    <link rel="stylesheet" href="../../styles/parentsPortalStyles/payments.css?v=1.1">
</head>

<body>
    <div class="container">
        <!-- Sidebar -->
        <aside class="sidebar" data-sideBar>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div class="header">
                <div class="header-content">
                    <h1>School Payments</h1>
                    <p>Select the items you'd like to pay for</p>
                </div>
                <div class="header-actions">
                    <button class="icon-btn">
                        <i class="fas fa-bell"></i>
                    </button>
                    <button class="icon-btn" id="menuToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                </div>
            </div>

            <div class="payment-card">
                <div class="payment-header">
                    <div class="fee-info">
                        <div class="fee-details">
                            <h2>
                                <div class="fee-icon">
                                    <i class="fas fa-book-open"></i>
                                </div>
                                School Fees
                            </h2>
                            <div class="fee-period">2nd Term - 2023/2024 Academic Session</div>
                        </div>
                        <div class="fee-amount">₦50,000</div>
                    </div>
                </div>

                <div class="services-section">
                    <h3 class="section-title">Additional Services</h3>

                    <div class="service-item" onclick="toggleService(this, 2000)">
                        <div class="service-left">
                            <div class="service-checkbox"></div>
                            <div class="service-info">
                                <div class="service-icon">
                                    <i class="fas fa-home"></i>
                                </div>
                                <div class="service-name">Hostel Accommodation</div>
                            </div>
                        </div>
                        <div class="service-price">₦2,000</div>
                    </div>

                    <div class="service-item" onclick="toggleService(this, 1500)">
                        <div class="service-left">
                            <div class="service-checkbox"></div>
                            <div class="service-info">
                                <div class="service-icon">
                                    <i class="fas fa-bus"></i>
                                </div>
                                <div class="service-name">School Bus Service</div>
                            </div>
                        </div>
                        <div class="service-price">₦1,500</div>
                    </div>

                    <div class="service-item" onclick="toggleService(this, 3000)">
                        <div class="service-left">
                            <div class="service-checkbox"></div>
                            <div class="service-info">
                                <div class="service-icon">
                                    <i class="fas fa-mountain"></i>
                                </div>
                                <div class="service-name">Educational Excursion</div>
                            </div>
                        </div>
                        <div class="service-price">₦3,000</div>
                    </div>
                </div>

                <div class="summary-section">
                    <h3 class="section-title">Payment Summary</h3>

                    <div class="summary-items" id="summaryItems">
                        <div class="summary-item">
                            <span>School Fees</span>
                            <span>₦50,000</span>
                        </div>
                    </div>

                    <div class="summary-total">
                        <span class="total-label">Total Amount</span>
                        <span class="total-amount" id="totalAmount">₦50,000</span>
                    </div>

                    <button class="pay-button">
                        <i class="fas fa-lock"></i> Proceed to Payment
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        let selectedServices = [];
        const baseAmount = 50000;

        function toggleService(element, price) {
            const checkbox = element.querySelector('.service-checkbox');
            const serviceName = element.querySelector('.service-name').textContent;
            const isSelected = element.classList.contains('selected');

            if (isSelected) {
                element.classList.remove('selected');
                checkbox.classList.remove('checked');
                selectedServices = selectedServices.filter(service => service.name !== serviceName);
            } else {
                element.classList.add('selected');
                checkbox.classList.add('checked');
                selectedServices.push({ name: serviceName, price: price });
            }

            updateSummary();
        }

        function updateSummary() {
            const summaryItems = document.getElementById('summaryItems');
            const totalAmount = document.getElementById('totalAmount');

            // Clear current items except school fees
            summaryItems.innerHTML = `
                <div class="summary-item">
                    <span>School Fees</span>
                    <span>₦50,000</span>
                </div>
            `;

            let total = baseAmount;

            selectedServices.forEach(service => {
                const item = document.createElement('div');
                item.className = 'summary-item';
                item.innerHTML = `
                    <span>${service.name}</span>
                    <span>₦${service.price.toLocaleString()}</span>
                `;
                summaryItems.appendChild(item);
                total += service.price;
            });

            totalAmount.textContent = `₦${total.toLocaleString()}`;
        }

    </script>
    <script type="module" src="../../scripts/parnetsPortalScripts/parents_portal_sidebar.js"></script>
</body>

</html>
