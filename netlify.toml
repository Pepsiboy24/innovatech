[build]
  publish = "."

# 1. Directly rewrite the homepage to display your login file
[[redirects]]
  from = "/"
  to = "/public/html/login.html"
  status = 200
  force = true

# 2. If they type /login, show the same file
[[redirects]]
  from = "/login"
  to = "/public/html/login.html"
  status = 200
  force = true

# 3. Authentication Paths
[[redirects]]
  from = "/signup"
  to = "/public/html/signup.html"
  status = 200

# 4. Admin Portal Rules
[[redirects]]
  from = "/admin"
  to = "/portals/admin/schoolAdminDashboard.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/portals/admin/:splat"
  status = 200

# 5. Teacher Portal Rules
[[redirects]]
  from = "/teacher"
  to = "/portals/teacher/teachersPortal.html"
  status = 200

[[redirects]]
  from = "/teacher/*"
  to = "/portals/teacher/:splat"
  status = 200

# 6. Parent Portal Rules
[[redirects]]
  from = "/parent"
  to = "/portals/parent/parentsPortal.html"
  status = 200

[[redirects]]
  from = "/parent/*"
  to = "/portals/parent/:splat"
  status = 200

# 7. Student Portal Rules
[[redirects]]
  from = "/student"
  to = "/portals/student/studentPortal.html"
  status = 200

[[redirects]]
  from = "/student/*"
  to = "/portals/student/:splat"
  status = 200
