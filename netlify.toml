[build]
  publish = "."

# 1. Force the root URL to redirect to the login screen
[[redirects]]
  from = "/"
  to = "/public/html/login.html"
  status = 301
  force = true

# 2. Authentication Paths
[[redirects]]
  from = "/login"
  to = "/public/html/login.html"
  status = 301

[[redirects]]
  from = "/signup"
  to = "/public/html/signup.html"
  status = 301

# 3. Admin Portal Rules
[[redirects]]
  from = "/admin"
  to = "/portals/admin/schoolAdminDashboard.html"
  status = 301

[[redirects]]
  from = "/admin/*"
  to = "/portals/admin/:splat"
  status = 301

# 4. Teacher Portal Rules
[[redirects]]
  from = "/teacher"
  to = "/portals/teacher/teachersPortal.html"
  status = 301

[[redirects]]
  from = "/teacher/*"
  to = "/portals/teacher/:splat"
  status = 301

# 5. Parent Portal Rules
[[redirects]]
  from = "/parent"
  to = "/portals/parent/parentsPortal.html"
  status = 301

[[redirects]]
  from = "/parent/*"
  to = "/portals/parent/:splat"
  status = 301

# 6. Student Portal Rules
[[redirects]]
  from = "/student"
  to = "/portals/student/studentPortal.html"
  status = 301

[[redirects]]
  from = "/student/*"
  to = "/portals/student/:splat"
  status = 301
