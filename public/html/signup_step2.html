<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 2: Admin Account - EduHub</title>
    <link rel="stylesheet" href="../styles/auth.css">
    <style>
        .signup-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .signup-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .signup-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #667eea);
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
        }

        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .step-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e5e7eb;
            color: #9ca3af;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            margin: 0 10px;
            position: relative;
        }

        .step.active {
            background: #667eea;
            color: white;
        }

        .step.completed {
            background: #16a34a;
            color: white;
        }

        .step::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 100%;
            width: 20px;
            height: 2px;
            background: #e5e7eb;
            transform: translateY(-50%);
        }

        .step:last-child::after {
            display: none;
        }

        .step.active::after {
            background: #667eea;
        }

        .step.completed::after {
            background: #16a34a;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            color: #374151;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #fecaca;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background: #f0fdf4;
            color: #16a34a;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #bbf7d0;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .password-notice {
            background: #fef3c7;
            border: 1px solid #fbbf24;
            color: #92400e;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .password-notice strong {
            display: block;
            margin-bottom: 4px;
            font-size: 16px;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff;
            border-top: 2px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="signup-container">
        <div class="signup-card">
            <div class="step-header">
                <h1>Create Admin Account</h1>
                <p>Set up your school administrator profile</p>
            </div>

            <div class="step-indicator">
                <div class="step completed">1</div>
                <div class="step active">2</div>
                <div class="step">3</div>
                <div class="step">4</div>
                <div class="step">5</div>
            </div>

            <div class="password-notice">
                <strong>🔐 Important Security Notice</strong>
                We'll automatically create your account with default password: <strong>123456</strong><br>
                You can change this in your settings after first login.
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <form id="step2Form">
                <div class="form-group">
                    <label for="fullName">Full Name *</label>
                    <input type="text" id="fullName" name="fullName" 
                           placeholder="Enter your full name" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="phoneNumber">Phone Number *</label>
                        <input type="tel" id="phoneNumber" name="phoneNumber" 
                               placeholder="+234 800 000 0000" required>
                    </div>

                    <div class="form-group">
                        <label for="gender">Gender *</label>
                        <select id="gender" name="gender" required>
                            <option value="">Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <div class="loading-spinner" id="loadingSpinner"></div>
                    <span id="btnText">Create Account & Continue</span>
                </button>
            </form>

            <div class="back-link">
                <a href="signup_step1.html">
                    <i class="fas fa-arrow-left"></i> Back to Step 1
                </a>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from '../../core/config.js';

        class SchoolSignupStep2 {
            constructor() {
                this.formData = {};
                this.init();
            }

            init() {
                this.setupEventListeners();
                this.loadSavedData();
            }

            setupEventListeners() {
                const form = document.getElementById('step2Form');
                if (form) {
                    form.addEventListener('submit', (e) => this.handleSubmit(e));
                }
            }

            loadSavedData() {
                // Load data from sessionStorage
                const schoolName = sessionStorage.getItem('schoolName');
                const workEmail = sessionStorage.getItem('workEmail');
                
                if (schoolName) {
                    console.log('Loaded school name:', schoolName);
                }
                if (workEmail) {
                    console.log('Loaded work email:', workEmail);
                }
            }

            async handleSubmit(e) {
                e.preventDefault();

                const fullName = document.getElementById('fullName').value.trim();
                const phoneNumber = document.getElementById('phoneNumber').value.trim();
                const gender = document.getElementById('gender').value;

                // Get saved data from sessionStorage
                const schoolName = sessionStorage.getItem('schoolName');
                const workEmail = sessionStorage.getItem('workEmail');
                const selectedTier = sessionStorage.getItem('selectedTier') || '1';

                // Validation
                if (!fullName || fullName.length < 3) {
                    this.showError('Please enter your full name (minimum 3 characters)');
                    return;
                }

                if (!phoneNumber || phoneNumber.length < 10) {
                    this.showError('Please enter a valid phone number');
                    return;
                }

                if (!gender) {
                    this.showError('Please select your gender');
                    return;
                }

                if (!workEmail) {
                    this.showError('School email is missing. Please start over from Step 1.');
                    return;
                }

                this.setLoading(true);

                try {
                    // Create Supabase auth account with default password
                    const { data, error } = await supabase.auth.signUp({
                        email: workEmail,
                        password: '123456', // Default password as specified
                        options: {
                            data: {
                                full_name: fullName,
                                school_name: schoolName,
                                user_type: 'school_admin',
                                signup_step: 2
                            }
                        }
                    });

                    if (error) {
                        throw error;
                    }

                    // Store additional data in sessionStorage
                    sessionStorage.setItem('fullName', fullName);
                    sessionStorage.setItem('phoneNumber', phoneNumber);
                    sessionStorage.setItem('gender', gender);
                    sessionStorage.setItem('authUserId', data.user.id);

                    this.showSuccess('Account created successfully! Proceeding to school setup...');

                    // Redirect to academic setup step after a short delay
                    setTimeout(() => {
                        window.location.href = 'signup_step2b_academic.html';
                    }, 2000);

                } catch (error) {
                    console.error('Account creation error:', error);
                    this.showError(error.message || 'Failed to create account. Please try again.');
                } finally {
                    this.setLoading(false);
                }
            }

            setLoading(isLoading) {
                const submitBtn = document.getElementById('submitBtn');
                const loadingSpinner = document.getElementById('loadingSpinner');
                const btnText = document.getElementById('btnText');

                submitBtn.disabled = isLoading;
                loadingSpinner.style.display = isLoading ? 'inline-block' : 'none';
                btnText.textContent = isLoading ? 'Creating Account...' : 'Create Account & Continue';
            }

            showError(message) {
                const errorEl = document.getElementById('errorMessage');
                const successEl = document.getElementById('successMessage');
                
                errorEl.textContent = message;
                errorEl.style.display = 'block';
                successEl.style.display = 'none';
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }

            showSuccess(message) {
                const errorEl = document.getElementById('errorMessage');
                const successEl = document.getElementById('successMessage');
                
                successEl.textContent = message;
                successEl.style.display = 'block';
                errorEl.style.display = 'none';
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        // Initialize the form
        document.addEventListener('DOMContentLoaded', () => {
            new SchoolSignupStep2();
        });
    </script>
</body>
</html>
