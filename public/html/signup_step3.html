<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 3: School Deployment - EduHub</title>
    <link rel="stylesheet" href="../assets/css/auth.css">
    <style>
        .onboarding-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .onboarding-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            width: 100%;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        /* SHIMMER EFFECT */
        .onboarding-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #667eea);
            background-size: 200% 100%;
            animation: shimmer 2s linear infinite;
        }

        @keyframes shimmer {
            0% {
                background-position: -200% 0;
            }

            100% {
                background-position: 200% 0;
            }
        }

        .step-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .step {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e5e7eb;
            color: #9ca3af;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            margin: 0 10px;
            position: relative;
        }

        .step.active {
            background: #667eea;
            color: white;
        }

        .step.completed {
            background: #16a34a;
            color: white;
        }

        /* RESPONSIVE FORM GRID */
        .academic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-section h3 {
            color: #374151;
            font-size: 18px;
            border-bottom: 2px solid #f3f4f6;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
        }

        .tier-selector {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .tier-option {
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            text-align: center;
            transition: 0.3s;
        }

        .tier-option.selected {
            border-color: #667eea;
            background: #f0f7ff;
            box-shadow: 0 0 0 2px #667eea;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-message {
            color: #dc2626;
            background: #fef2f2;
            padding: 10px;
            border-radius: 8px;
            display: none;
            margin-bottom: 20px;
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 600px) {
            .onboarding-card {
                padding: 20px;
            }

            .tier-selector {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="onboarding-container">
        <div class="onboarding-card">
            <div class="step-header">
                <h1>Deploy Your School</h1>
                <p>Launch your platform with your custom configuration</p>
            </div>

            <div class="step-indicator">
                <div class="step completed">1</div>
                <div class="step completed">2</div>
                <div class="step active">3</div>
                <div class="step">4</div>
                <div class="step">5</div>
            </div>

            <div id="errorMessage" class="error-message"></div>

            <form id="step3Form">
                <div class="form-section">
                    <h3>Bank Details</h3>
                    <div class="academic-grid">
                        <div class="form-group">
                            <label>Bank Name *</label>
                            <input type="text" id="bankName" required>
                        </div>
                        <div class="form-group">
                            <label>Account Number *</label>
                            <input type="text" id="accountNumber" required>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Academic Setup</h3>
                    <div class="academic-grid">
                        <div class="form-group">
                            <label>Current Session *</label>
                            <input type="text" id="academicSession" placeholder="e.g. 2024/2025" required>
                        </div>
                        <div class="form-group">
                            <label>Current Term *</label>
                            <select id="currentTerm" required>
                                <option value="First Term">First Term</option>
                                <option value="Second Term">Second Term</option>
                                <option value="Third Term">Third Term</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Choose Plan</h3>
                    <div class="tier-selector">
                        <div class="tier-option selected" onclick="selectTier(1)" id="tier1">
                            <h4>Tier 1</h4>
                            <p>Basic Admin</p>
                        </div>
                        <div class="tier-option" onclick="selectTier(2)" id="tier2">
                            <h4>Tier 2</h4>
                            <p>Student Portal</p>
                        </div>
                        <div class="tier-option" onclick="selectTier(3)" id="tier3">
                            <h4>Tier 3</h4>
                            <p>Full AI Suite</p>
                        </div>
                    </div>
                    <input type="hidden" id="tierSelect" value="1">
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <div id="loadingSpinner" class="loading-spinner" style="display:none"></div>
                    <span id="btnText">Deploy My School</span>
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        const SUPABASE_URL = 'https://dzotwozhcxzkxtunmqth.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6b3R3b3poY3h6a3h0dW5tcXRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTUwODk5NzAsImV4cCI6MjA3MDY2NTk3MH0.KJfkrRq46c_Fo7ujkmvcue4jQAzIaSDfO3bU7YqMZdE';

        // ISOLATED CLIENT - This is the secret to staying logged in!
        const authClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                storageKey: 'sb-onboarding-temp',
                persistSession: false,
                autoRefreshToken: false
            }
        });

        window.selectTier = function (tier) {
            document.querySelectorAll('.tier-option').forEach(opt => opt.classList.remove('selected'));
            document.getElementById(`tier${tier}`).classList.add('selected');
            document.getElementById('tierSelect').value = tier;
        };

        const form = document.getElementById('step3Form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const spinner = document.getElementById('loadingSpinner');
            const errorEl = document.getElementById('errorMessage');

            // Collect Data
            const email = sessionStorage.getItem('workEmail');
            const schoolName = sessionStorage.getItem('schoolName');
            const bankName = document.getElementById('bankName').value;
            const accountNo = document.getElementById('accountNumber').value;
            const sessionName = document.getElementById('academicSession').value;
            const term = document.getElementById('currentTerm').value;
            const tier = document.getElementById('tierSelect').value;

            btn.disabled = true;
            spinner.style.display = 'block';
            errorEl.style.display = 'none';

            try {
                // 1. Sign In via AuthClient
                const { data: authData, error: authError } = await authClient.auth.signInWithPassword({
                    email: email,
                    password: '123456' // Using your default from step 1
                });

                if (authError) throw authError;

                // 2. Create School (Using authClient ensures the token is sent!)

                const { data: school, error: schoolErr } = await authClient
                    .from('Schools')
                    .insert([{
                        school_name: schoolName,
                        bank_name: bankName,
                        account_number: accountNo,
                        current_session: sessionName,
                        current_term: term,
                        tier: tier,
                        is_active: true
                    }])
                    .select()
                    .single();

                if (schoolErr) throw schoolErr;

                // 3. Create Admin Profile
                const { error: adminErr } = await authClient
                    .from('School_Admin')
                    .insert([{
                        email: email,
                        school_id: school.school_id,
                        role: 'super_admin'
                    }]);

                if (adminErr) throw adminErr;

                // 4. Create Academic Session
                const { data: sessionRow, error: sessionErr } = await authClient
                    .from('Academic_Session')
                    .insert([{
                        school_id: school.school_id,
                        session_name: sessionName,
                        is_active: true
                    }])
                    .select()
                    .single();

                // 5. Bulk Create Classes (The Flexible Architecture Magic)
                const generatedClasses = JSON.parse(localStorage.getItem('generatedClasses') || '[]');
                if (generatedClasses.length) {
                    const classRows = generatedClasses.map(cls => ({
                        class_name: cls.name,
                        section: cls.arm,
                        level_group: cls.group_name,
                        school_id: school.school_id,
                        academic_session_id: sessionRow ? sessionRow.session_id : null
                    }));

                    await authClient.from('Classes').insert(classRows);
                }

                // Sync the school_id and tier metadata before redirecting
                const { error: metadataErr } = await authClient.auth.updateUser({
                    data: {
                        school_id: school.school_id,
                        tier: tier
                    }
                });

                if (metadataErr) throw metadataErr;

                // 6. Redirect to Dashboard
                alert("Deployment Successful! Taking you to your dashboard.");
                // sessionStorage.clear();
                localStorage.removeItem('generatedClasses');
                window.location.href = '../html/signup_step4.html';

            } catch (err) {
                console.error(err);
                errorEl.textContent = "Deployment Error: " + err.message;
                errorEl.style.display = 'block';
                btn.disabled = false;
                spinner.style.display = 'none';
            }
        });
    </script>
</body>

</html>
