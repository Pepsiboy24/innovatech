<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - EduHubAdmin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reset-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 20px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .reset-header {
            margin-bottom: 30px;
        }

        .reset-header h2 {
            color: #1f2937;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .reset-header p {
            color: #6b7280;
            font-size: 16px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 12px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 14px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background: #5a67d8;
        }

        .btn:disabled {
            background: #9ca3af;
            cursor: not-allowed;
        }

        .back-link {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            margin-top: 20px;
            display: inline-block;
        }

        .error-message {
            background: #fef2f2;
            /* border: 1px solid #fecaca3; */
            color: #dc2626;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background: #10b981;
            border: 1px solid #059669;
            color: #065f46;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #667eea;
            border-radius: 50%;
            border-top-color: #667eea transparent;
            border-right-color: #667eea transparent;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="reset-container">
        <div class="reset-header">
            <h2>Reset Password</h2>
            <p>Enter your email address and we'll send you a password reset link.</p>
        </div>

        <form id="resetForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email address"
                    autocomplete="email">
            </div>

            <button type="submit" class="btn" id="resetBtn">
                <span id="btnText">Send Reset Link</span>
                <span id="btnLoading" class="loading" style="display: none;">
                    <i class="fas fa-spinner"></i>
                </span>
            </button>
        </form>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <a href="login.html" class="back-link">
            <i class="fas fa-arrow-left"></i>
            Back to Login
        </a>
    </div>

    <script type="module" src="../assets/js-shared/authRecovery.js"></script>
    <script>
        import { AuthRecovery } from '../assets/js-shared/authRecovery.js';

        const authRecovery = new AuthRecovery();

        // Initialize the recovery system
        authRecovery.initialize().then(() => {
            // Setup form handler
            const resetForm = document.getElementById('resetForm');
            const resetBtn = document.getElementById('resetBtn');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            const btnText = document.getElementById('btnText');
            const btnLoading = document.getElementById('btnLoading');

            resetForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const email = document.getElementById('email').value.trim();

                if (!email) {
                    showError('Please enter your email address');
                    return;
                }

                // Show loading state
                setLoading(true);

                try {
                    const result = await authRecovery.requestPasswordReset(email);

                    if (result.success) {
                        showSuccess(result.message);
                        resetForm.reset();
                    } else {
                        showError(result.error);
                    }
                } catch (error) {
                    showError('An error occurred. Please try again.');
                } finally {
                    setLoading(false);
                }
            });

            function setLoading(loading) {
                resetBtn.disabled = loading;
                btnText.style.display = loading ? 'none' : 'inline';
                btnLoading.style.display = loading ? 'inline' : 'none';
            }

            function showError(message) {
                errorMessage.textContent = message;
                errorMessage.style.display = 'block';
                successMessage.style.display = 'none';
            }

            function showSuccess(message) {
                successMessage.textContent = message;
                successMessage.style.display = 'block';
                errorMessage.style.display = 'none';
            }

            // Check for token in URL (for direct reset link access)
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');

            if (token) {
                // Show password reset form
                document.querySelector('.reset-header h2').textContent = 'Create New Password';
                document.querySelector('.reset-header p').textContent = 'Enter your new password below.';

                // Change form to password reset
                resetForm.innerHTML = `
                    <div class="form-group">
                        <label for="password">New Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            required 
                            placeholder="Enter new password"
                            minlength="8"
                        >
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input 
                            type="password" 
                            id="confirmPassword" 
                            name="confirmPassword" 
                            required 
                            placeholder="Confirm new password"
                            minlength="8"
                        >
                    </div>
                    <button type="submit" class="btn">
                        <span id="btnText">Reset Password</span>
                        <span id="btnLoading" class="loading" style="display: none;">
                            <i class="fas fa-spinner"></i>
                        </span>
                    </button>
                `;

                // Setup password reset handler
                resetForm.addEventListener('submit', async (e) => {
                    e.preventDefault();

                    const password = document.getElementById('password').value;
                    const confirmPassword = document.getElementById('confirmPassword').value;

                    if (!password || !confirmPassword) {
                        showError('Please enter and confirm your new password');
                        return;
                    }

                    if (password.length < 8) {
                        showError('Password must be at least 8 characters long');
                        return;
                    }

                    setLoading(true);

                    try {
                        const result = await authRecovery.resetPassword(token, password, confirmPassword);

                        if (result.success) {
                            showSuccess(result.message);
                            // Redirect to login after successful reset
                            setTimeout(() => {
                                window.location.href = "/public/html/login.html"';
                            }, 2000);
                        } else {
                            showError(result.error);
                        }
                    } catch (error) {
                        showError('An error occurred. Please try again.');
                    } finally {
                        setLoading(false);
                    }
                });
            }
        });
    </script>
</body>

</html>
